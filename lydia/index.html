<html lang="en">

<title>Lydia Benham | TierAxis</title>
<meta name="description" content="Digital business card &mdash; Lydia Benham, Co-Founder, TierAxis.">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--white:#fffefe;--dark:#4b4b43;--darker:#3a3a33;--gold:#f4b42a;--gold-dark:#a06f00;--light:#e5e5e5;--light-2:#f5f4ee;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--darker);color:var(--dark);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2.5rem 1rem;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(244,180,42,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(244,180,42,0.05) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.card{position:relative;z-index:2;width:100%;max-width:400px;background:var(--white);border-radius:6px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.35);}
.card-top{padding:1.5rem 1.75rem 1.25rem;border-bottom:1px solid var(--light);}
.card-logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.08em;color:var(--dark);text-decoration:none;display:inline-block;}
.card-logo span{color:var(--gold);}
.card-eyebrow{font-size:0.62rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dark);margin-top:0.4rem;display:flex;align-items:center;gap:0.5rem;}
.card-eyebrow::before{content:'';display:block;width:1.2rem;height:1px;background:var(--gold-dark);}
.card-id{padding:2rem 1.75rem 1.5rem;text-align:center;}
.avatar{width:104px;height:104px;border-radius:50%;margin:0 auto 1.25rem;background:var(--darker);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.03em;color:var(--dark);line-height:1;}
.card-title{font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:400;letter-spacing:0.04em;color:var(--dark);opacity:0.7;margin-top:0.5rem;}
.card-company{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.12em;color:var(--gold-dark);margin-top:0.35rem;text-transform:uppercase;}
.card-tagline{margin:1.25rem 1.75rem 0;padding-left:0.9rem;border-left:3px solid var(--gold);font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:0.92rem;line-height:1.5;color:var(--dark);opacity:0.85;}
.card-actions{padding:1.5rem 1.75rem 0;}
.btn-save{display:block;width:100%;text-align:center;background:var(--gold);color:var(--dark);padding:0.95rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;border:2px solid var(--gold);border-radius:4px;cursor:pointer;transition:background 0.22s,color 0.22s,border-color 0.22s,transform 0.15s;}
.btn-save:hover{background:var(--dark);border-color:var(--dark);color:var(--white);transform:translateY(-2px);}
.quick-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-top:0.75rem;}
.quick-btn{display:flex;flex-direction:column;align-items:center;gap:0.35rem;padding:0.75rem 0.5rem;border:1px solid var(--light);border-radius:4px;text-decoration:none;color:var(--dark);font-size:0.68rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;transition:border-color 0.2s,background 0.2s,transform 0.15s;}
.quick-btn:hover{border-color:var(--gold);background:var(--light-2);transform:translateY(-1px);}
.quick-btn .ic{font-size:1.1rem;line-height:1;color:var(--gold-dark);font-style:normal;font-family:'Bebas Neue',sans-serif;}
.btn-web{display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;margin-top:0.75rem;padding:0.85rem 1rem;border:1px solid var(--light);border-radius:4px;text-decoration:none;color:var(--dark);font-size:0.78rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;transition:border-color 0.2s,background 0.2s;}
.btn-web:hover{border-color:var(--gold);background:var(--light-2);}
.card-qr{margin-top:1.75rem;padding:1.75rem 1.75rem 1.5rem;border-top:1px solid var(--light);text-align:center;}
.qr-box{display:inline-block;padding:0.75rem;background:var(--white);border:1px solid var(--light);border-radius:6px;line-height:0;}
.qr-caption{font-size:0.68rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--dark);opacity:0.5;margin-top:0.85rem;}
.card-foot{background:var(--darker);padding:1.1rem 1.75rem;text-align:center;}
.card-foot-logo{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.08em;color:rgba(255,254,254,0.4);text-decoration:none;}
.card-foot-logo span{color:var(--gold);}
.card-foot-tag{font-size:0.66rem;letter-spacing:0.05em;color:rgba(255,254,254,0.3);margin-top:0.3rem;}
</style>
</head>
